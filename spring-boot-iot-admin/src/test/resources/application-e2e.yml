spring:
  autoconfigure:
    exclude:
      - org.redisson.spring.starter.RedissonAutoConfigurationV4

  datasource:
    dynamic:
      primary: master
      strict: false
      datasource:
        master:
          url: jdbc:h2:mem:rm_iot_e2e;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
          username: sa
          password:
          driver-class-name: org.h2.Driver

  sql:
    init:
      mode: always
      schema-locations: classpath:schema-e2e.sql

  data:
    redis:
      repositories:
        enabled: false
      host: 127.0.0.1
      port: 6379
      password:
      database: 0
      timeout: 10s

  cloud:
    aes:
      merchants:
        62000001:
          key: "FWx7ESWwrfx/F7T9bLKfjIOcRdyqnT1ayHqZkB6Q4Ak="
          key-derivation: false
          mode: AES/CBC/PKCS5Padding

logging:
  level:
    root: info
    com.ghlzm.iot: info

management:
  health:
    redis:
      enabled: false

iot:
  mqtt:
    broker-url: tcp://127.0.0.1:1883
    username:
    password:

  telemetry:
    storage-type: mysql

  rule:
    enabled: false

  ota:
    enabled: false
