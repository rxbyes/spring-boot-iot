server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  datasource:
    dynamic:
      primary: master
      strict: true
      datasource:
        master:
          url: ${IOT_MYSQL_URL:jdbc:mysql://127.0.0.1:3306/rm_iot?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
          username: ${IOT_MYSQL_USERNAME:root}
          password: ${IOT_MYSQL_PASSWORD:root}
          driver-class-name: com.mysql.cj.jdbc.Driver
          hikari:
            maximum-pool-size: ${IOT_MYSQL_HIKARI_MAX_POOL_SIZE:30}
            minimum-idle: ${IOT_MYSQL_HIKARI_MIN_IDLE:5}
            connection-timeout: ${IOT_MYSQL_HIKARI_CONNECTION_TIMEOUT_MS:30000}
            validation-timeout: ${IOT_MYSQL_HIKARI_VALIDATION_TIMEOUT_MS:5000}
            idle-timeout: ${IOT_MYSQL_HIKARI_IDLE_TIMEOUT_MS:180000}
            max-lifetime: ${IOT_MYSQL_HIKARI_MAX_LIFETIME_MS:240000}
            keepalive-time: ${IOT_MYSQL_HIKARI_KEEPALIVE_TIME_MS:120000}
            leak-detection-threshold: ${IOT_MYSQL_HIKARI_LEAK_DETECTION_THRESHOLD_MS:20000}
            connection-test-query: SELECT 1

  data:
    redis:
      host: ${IOT_REDIS_HOST:127.0.0.1}
      port: ${IOT_REDIS_PORT:6379}
      password: ${IOT_REDIS_PASSWORD:}
      database: ${IOT_REDIS_DATABASE:3}
      timeout: 10s

logging:
  level:
    root: warn
    com.ghlzm.iot: info
  file:
    name: /data/logs/spring-boot-iot/spring-boot-iot.log

iot:
  security:
    jwt-secret: ${IOT_JWT_SECRET:change-to-prod-very-strong-secret}

  mqtt:
    enabled: ${IOT_MQTT_ENABLED:false}
    broker-url: ${IOT_MQTT_BROKER_URL:tcp://127.0.0.1:1883}
    # 默认共享 clientId 会在运行时追加主机/PID 后缀；如需固定值，请显式设置为自定义非默认值。
    client-id: ${IOT_MQTT_CLIENT_ID:spring-boot-iot-mqtt-consumer}
    username: ${IOT_MQTT_USERNAME:admin}
    password: ${IOT_MQTT_PASSWORD:public}
    cluster-singleton-enabled: ${IOT_MQTT_CLUSTER_SINGLETON_ENABLED:true}
    cluster-lock-key: ${IOT_MQTT_CLUSTER_LOCK_KEY:iot:mqtt:consumer:leader}
    cluster-lock-ttl-seconds: ${IOT_MQTT_CLUSTER_LOCK_TTL_SECONDS:30}
    cluster-lock-renew-interval-seconds: ${IOT_MQTT_CLUSTER_LOCK_RENEW_INTERVAL_SECONDS:10}
    cluster-lock-acquire-interval-seconds: ${IOT_MQTT_CLUSTER_LOCK_ACQUIRE_INTERVAL_SECONDS:5}

  telemetry:
    storage-type: tdengine
    primary-storage: ${IOT_TELEMETRY_PRIMARY_STORAGE:tdengine-v2}
    tdengine-mode: legacy-compatible
    legacy-normalized-fallback-enabled: true
    raw:
      retention-days: ${IOT_TELEMETRY_RAW_RETENTION_DAYS:180}
    latest:
      redis-enabled: ${IOT_TELEMETRY_LATEST_REDIS_ENABLED:true}
      mysql-projection-enabled: ${IOT_TELEMETRY_LATEST_MYSQL_PROJECTION_ENABLED:true}
    aggregate:
      enabled: ${IOT_TELEMETRY_AGGREGATE_ENABLED:false}
      hourly-enabled: ${IOT_TELEMETRY_AGGREGATE_HOURLY_ENABLED:false}
      daily-enabled: ${IOT_TELEMETRY_AGGREGATE_DAILY_ENABLED:false}
    legacy-mirror:
      enabled: ${IOT_TELEMETRY_LEGACY_MIRROR_ENABLED:true}
      mode: ${IOT_TELEMETRY_LEGACY_MIRROR_MODE:legacy-compatible}
      retry-enabled: ${IOT_TELEMETRY_LEGACY_MIRROR_RETRY_ENABLED:false}
    read-routing:
      latest-source: ${IOT_TELEMETRY_READ_LATEST_SOURCE:v2}
      history-source: ${IOT_TELEMETRY_READ_HISTORY_SOURCE:legacy}
      aggregate-source: ${IOT_TELEMETRY_READ_AGGREGATE_SOURCE:v2-aggregate}
      legacy-read-fallback-enabled: ${IOT_TELEMETRY_LEGACY_READ_FALLBACK_ENABLED:true}
    tenant-routing:
      mode: ${IOT_TELEMETRY_TENANT_ROUTING_MODE:tenant-device}

  rule:
    enabled: true

  observability:
    invalid-report-governance:
      enabled: ${IOT_OBSERVABILITY_INVALID_REPORT_GOVERNANCE_ENABLED:true}
      bucket-ttl-hours: ${IOT_OBSERVABILITY_INVALID_REPORT_BUCKET_TTL_HOURS:26}
      empty-payload:
        threshold-window-seconds: ${IOT_OBSERVABILITY_INVALID_REPORT_EMPTY_PAYLOAD_WINDOW_SECONDS:60}
        threshold-count: ${IOT_OBSERVABILITY_INVALID_REPORT_EMPTY_PAYLOAD_THRESHOLD_COUNT:3}
        cooldown-minutes: ${IOT_OBSERVABILITY_INVALID_REPORT_EMPTY_PAYLOAD_COOLDOWN_MINUTES:15}
      device-not-found:
        threshold-window-seconds: ${IOT_OBSERVABILITY_INVALID_REPORT_DEVICE_NOT_FOUND_WINDOW_SECONDS:60}
        threshold-count: ${IOT_OBSERVABILITY_INVALID_REPORT_DEVICE_NOT_FOUND_THRESHOLD_COUNT:2}
        cooldown-minutes: ${IOT_OBSERVABILITY_INVALID_REPORT_DEVICE_NOT_FOUND_COOLDOWN_MINUTES:30}

  ota:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
