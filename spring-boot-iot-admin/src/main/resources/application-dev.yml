  rule:
    enabled: false

  alarm:
    auto-closure:
      enabled: true
      cooldown-minutes: 30
      yellow: 5
      orange: 10
      red: 20

  observability:
    system-error-notify-enabled: ${IOT_OBSERVABILITY_SYSTEM_ERROR_NOTIFY_ENABLED:true}
    notification-timeout-ms: ${IOT_OBSERVABILITY_NOTIFICATION_TIMEOUT_MS:3000}
    system-error-notify-cooldown-seconds: ${IOT_OBSERVABILITY_SYSTEM_ERROR_NOTIFY_COOLDOWN_SECONDS:300}
    invalid-report-governance:
      enabled: ${IOT_OBSERVABILITY_INVALID_REPORT_GOVERNANCE_ENABLED:true}
      bucket-ttl-hours: ${IOT_OBSERVABILITY_INVALID_REPORT_BUCKET_TTL_HOURS:26}
      empty-payload:
        threshold-window-seconds: ${IOT_OBSERVABILITY_INVALID_REPORT_EMPTY_PAYLOAD_WINDOW_SECONDS:60}
        threshold-count: ${IOT_OBSERVABILITY_INVALID_REPORT_EMPTY_PAYLOAD_THRESHOLD_COUNT:3}
        cooldown-minutes: ${IOT_OBSERVABILITY_INVALID_REPORT_EMPTY_PAYLOAD_COOLDOWN_MINUTES:15}
      device-not-found:
        threshold-window-seconds: ${IOT_OBSERVABILITY_INVALID_REPORT_DEVICE_NOT_FOUND_WINDOW_SECONDS:60}
        threshold-count: ${IOT_OBSERVABILITY_INVALID_REPORT_DEVICE_NOT_FOUND_THRESHOLD_COUNT:2}
        cooldown-minutes: ${IOT_OBSERVABILITY_INVALID_REPORT_DEVICE_NOT_FOUND_COOLDOWN_MINUTES:30}
    message-flow:
      enabled: ${IOT_OBSERVABILITY_MESSAGE_FLOW_ENABLED:true}
      ttl-hours: ${IOT_OBSERVABILITY_MESSAGE_FLOW_TTL_HOURS:24}
      session-match-window-seconds: ${IOT_OBSERVABILITY_MESSAGE_FLOW_SESSION_MATCH_WINDOW_SECONDS:120}
      recent-session-limit: ${IOT_OBSERVABILITY_MESSAGE_FLOW_RECENT_SESSION_LIMIT:500}
    console:
      mybatis-sql-enabled: ${IOT_OBSERVABILITY_CONSOLE_MYBATIS_SQL_ENABLED:true}
      mybatis-session-enabled: ${IOT_OBSERVABILITY_CONSOLE_MYBATIS_SESSION_ENABLED:true}
    diagnostic:
      #      用于承接慢 SQL 摘要
      sql-file-enabled: ${IOT_OBSERVABILITY_DIAGNOSTIC_SQL_FILE_ENABLED:true}
      #      用于承接慢 HTTP / 慢 MQTT 摘要
      access-file-enabled: ${IOT_OBSERVABILITY_DIAGNOSTIC_ACCESS_FILE_ENABLED:true}
    performance:
      slow-sql-threshold-ms: ${IOT_OBSERVABILITY_PERFORMANCE_SLOW_SQL_THRESHOLD_MS:500}
      slow-http-threshold-ms: ${IOT_OBSERVABILITY_PERFORMANCE_SLOW_HTTP_THRESHOLD_MS:1000}
      slow-mqtt-threshold-ms: ${IOT_OBSERVABILITY_PERFORMANCE_SLOW_MQTT_THRESHOLD_MS:1000}
    in-app-unread-bridge:
      enabled: ${IOT_OBSERVABILITY_IN_APP_UNREAD_BRIDGE_ENABLED:true}
      scan-interval-seconds: ${IOT_OBSERVABILITY_IN_APP_UNREAD_BRIDGE_SCAN_INTERVAL_SECONDS:60}
      high-threshold-minutes: ${IOT_OBSERVABILITY_IN_APP_UNREAD_BRIDGE_HIGH_THRESHOLD_MINUTES:30}
      critical-threshold-minutes: ${IOT_OBSERVABILITY_IN_APP_UNREAD_BRIDGE_CRITICAL_THRESHOLD_MINUTES:10}
    alerting:
      enabled: ${IOT_OBSERVABILITY_ALERTING_ENABLED:false}
      scene: ${IOT_OBSERVABILITY_ALERTING_SCENE:observability_alert}
      evaluate-interval-seconds: ${IOT_OBSERVABILITY_ALERTING_EVALUATE_INTERVAL_SECONDS:60}
      cooldown-minutes: ${IOT_OBSERVABILITY_ALERTING_COOLDOWN_MINUTES:30}
      system-error:
        enabled: ${IOT_OBSERVABILITY_ALERTING_SYSTEM_ERROR_ENABLED:true}
        window-minutes: ${IOT_OBSERVABILITY_ALERTING_SYSTEM_ERROR_WINDOW_MINUTES:10}
        threshold: ${IOT_OBSERVABILITY_ALERTING_SYSTEM_ERROR_THRESHOLD:5}
      mqtt-disconnect:
        enabled: ${IOT_OBSERVABILITY_ALERTING_MQTT_DISCONNECT_ENABLED:true}
        duration-minutes: ${IOT_OBSERVABILITY_ALERTING_MQTT_DISCONNECT_DURATION_MINUTES:5}
      failure-stage:
        enabled: ${IOT_OBSERVABILITY_ALERTING_FAILURE_STAGE_ENABLED:true}
        window-minutes: ${IOT_OBSERVABILITY_ALERTING_FAILURE_STAGE_WINDOW_MINUTES:10}
        threshold: ${IOT_OBSERVABILITY_ALERTING_FAILURE_STAGE_THRESHOLD:10}
      in-app-bridge:
        enabled: ${IOT_OBSERVABILITY_ALERTING_IN_APP_BRIDGE_ENABLED:true}
        window-minutes: ${IOT_OBSERVABILITY_ALERTING_IN_APP_BRIDGE_WINDOW_MINUTES:10}
        threshold: ${IOT_OBSERVABILITY_ALERTING_IN_APP_BRIDGE_THRESHOLD:3}
      risk-governance-missing-policy:
        enabled: ${IOT_OBSERVABILITY_ALERTING_RISK_GOVERNANCE_MISSING_POLICY_ENABLED:true}
        threshold: ${IOT_OBSERVABILITY_ALERTING_RISK_GOVERNANCE_MISSING_POLICY_THRESHOLD:3}
      risk-governance-ops-alerts:
        enabled: ${IOT_OBSERVABILITY_ALERTING_RISK_GOVERNANCE_OPS_ALERTS_ENABLED:true}
        field-drift-threshold: ${IOT_OBSERVABILITY_ALERTING_RISK_GOVERNANCE_OPS_ALERTS_FIELD_DRIFT_THRESHOLD:1}
        contract-diff-threshold: ${IOT_OBSERVABILITY_ALERTING_RISK_GOVERNANCE_OPS_ALERTS_CONTRACT_DIFF_THRESHOLD:1}
        missing-risk-metric-threshold: ${IOT_OBSERVABILITY_ALERTING_RISK_GOVERNANCE_OPS_ALERTS_MISSING_RISK_METRIC_THRESHOLD:1}

