spring:
  datasource:
    dynamic:
      primary: master
      strict: true
      datasource:
        master:
          url: jdbc:mysql://prod-db-host:3306/spring_boot_iot?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
          username: prod_user
          password: prod_password
          driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: prod-redis-host
      port: 6379
      password: prod_redis_password
      database: 3
      timeout: 10s

logging:
  level:
    root: warn
    com.ghlzm.iot: info
  file:
    name: /data/logs/spring-boot-iot/spring-boot-iot.log

iot:
  security:
    jwt-secret: change-to-prod-very-strong-secret

  mqtt:
    broker-url: tcp://prod-mqtt-host:1883
    username: prod_mqtt_user
    password: prod_mqtt_password

  telemetry:
    storage-type: tdengine

  rule:
    enabled: true

  ota:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics